<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1100" viewBox="0 0 1500 1100" role="img" aria-labelledby="title desc">
  <title id="title">Research Note current architecture</title>
  <desc id="desc">Current architecture of the AstrBot Research Note plugin, including commands, import, tools, agent modes, embedding-only search, JSON or SQLite storage, and external research tools.</desc>
  <defs>
