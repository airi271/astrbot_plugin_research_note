  <rect class="badge-green" x="724" y="398" width="84" height="22" />
  <text class="phase" x="738" y="413">Phase 1-5</text>
  <rect class="badge-red" x="820" y="716" width="84" height="22" />
  <text class="phase" x="834" y="731">Phase 6-8</text>
  <rect class="badge-green" x="1140" y="728" width="88" height="22" />
  <text class="phase" x="1154" y="743">Phase 9</text>
  <rect class="badge-purple" x="110" y="700" width="92" height="22" />
  <text class="phase" x="122" y="715">Phase 11</text>
  <rect class="badge-blue" x="218" y="700" width="92" height="22" />
  <text class="phase" x="230" y="715">Phase 12</text>

  <text class="tiny" x="64" y="954">Generated for astrbot_plugin_research_note. Solid arrows show normal data/tool flow. Dashed arrows show later-phase orchestration and feedback paths.</text>
</svg>
