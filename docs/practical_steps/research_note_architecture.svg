      .label { font: 700 14px sans-serif; fill: #233145; }
      .small { font: 500 12px sans-serif; fill: #536477; }
      .tiny { font: 500 11px sans-serif; fill: #63748a; }
      .micro { font: 500 10px sans-serif; fill: #63748a; }
      .arrow { stroke: #65758a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrow-blue { stroke: #2e7fc0; stroke-width: 2.4; fill: none; marker-end: url(#arrowBlue); }
      .arrow-green { stroke: #2e9854; stroke-width: 2.4; fill: none; marker-end: url(#arrowGreen); }
      .arrow-orange { stroke: #ce7a25; stroke-width: 2.4; fill: none; marker-end: url(#arrowOrange); }
      .arrow-purple { stroke: #7056c9; stroke-width: 2.4; fill: none; marker-end: url(#arrowPurple); }
      .arrow-red { stroke: #cf5364; stroke-width: 2.4; fill: none; marker-end: url(#arrowRed); }
      .dash { stroke-dasharray: 7 6; }
      .badge { font: 700 11px sans-serif; fill: #ffffff; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><path d="M0 0 L12 4 L0 8 Z" fill="#65758a" /></marker>
