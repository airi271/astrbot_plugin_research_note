  <rect class="bg" x="0" y="0" width="1500" height="1100" />
  <text class="title" x="56" y="58">Research Note Plugin Architecture</text>
  <text class="subtitle" x="56" y="84">Current implementation: source-grounded RAG, import, tools, agents, embedding-only search, and JSON/SQLite storage.</text>

  <rect class="panel" x="54" y="120" width="210" height="220" />
  <text class="section" x="82" y="154">User Side</text>
  <rect class="box" x="82" y="178" width="154" height="54" />
  <text class="label" x="102" y="202">User</text>
  <text class="small" x="102" y="220">research task</text>
  <rect class="box" x="82" y="252" width="154" height="54" />
  <text class="label" x="102" y="276">Chat Platform</text>
  <text class="small" x="102" y="294">Slack / Telegram</text>

  <rect class="blue" x="318" y="106" width="270" height="260" />
  <text class="section" x="348" y="140">AstrBot Core</text>
  <rect class="box-blue" x="348" y="166" width="210" height="46" />
  <text class="label" x="368" y="194">Message Event</text>
  <rect class="box-blue" x="348" y="226" width="210" height="46" />
  <text class="label" x="368" y="254">Plugin Star</text>
  <rect class="box-blue" x="348" y="286" width="210" height="46" />
  <text class="label" x="368" y="314">Context API</text>

  <rect class="green" x="658" y="116" width="456" height="322" />
  <text class="section" x="690" y="152">Research Note Plugin</text>
  <text class="small" x="690" y="174">data/plugins/astrbot_plugin_research_note</text>
  <rect class="box-green" x="690" y="198" width="174" height="56" />
  <text class="label" x="710" y="222">Command Router</text>
  <text class="small" x="710" y="240">add / ask / search</text>
  <rect class="box-green" x="908" y="198" width="174" height="56" />
  <text class="label" x="928" y="222">Import Preview</text>
  <text class="small" x="928" y="240">text / url / confirm</text>
  <rect class="box-green" x="690" y="274" width="174" height="56" />
  <text class="label" x="710" y="298">Chunking</text>
  <text class="small" x="710" y="316">Document -&gt; Chunks</text>
  <rect class="box-green" x="908" y="274" width="174" height="56" />
  <text class="label" x="928" y="298">Embedding Search</text>
  <text class="small" x="928" y="316">embedding-only</text>
  <rect class="box-green" x="690" y="350" width="174" height="56" />
  <text class="label" x="710" y="374">Prompt Builder</text>
  <text class="small" x="710" y="392">Sources / Unknowns</text>
  <rect class="box-green" x="908" y="350" width="174" height="56" />
  <text class="label" x="928" y="374">Registered Tools</text>
  <text class="small" x="928" y="392">research_* tools</text>

  <rect class="orange" x="1190" y="112" width="250" height="230" />
  <text class="section" x="1220" y="148">LLM Providers</text>
  <rect class="box-orange" x="1220" y="174" width="190" height="52" />
  <text class="label" x="1240" y="204">Chat Model</text>
  <rect class="box-orange" x="1220" y="246" width="190" height="52" />
  <text class="label" x="1240" y="276">Embedding Model</text>

  <rect class="purple" x="70" y="470" width="354" height="328" />
  <text class="section" x="100" y="506">Research Storage</text>
  <rect class="box-purple" x="100" y="532" width="138" height="54" />
  <text class="label" x="120" y="556">JSON backend</text>
  <text class="small" x="120" y="574">research_notes.json</text>
  <rect class="box-purple" x="258" y="532" width="138" height="54" />
  <text class="label" x="278" y="556">SQLite backend</text>
  <text class="micro" x="278" y="572">research_notes</text>
  <text class="micro" x="278" y="584">.sqlite3</text>
  <rect class="box-purple" x="100" y="606" width="138" height="54" />
  <text class="label" x="120" y="630">Documents</text>
  <text class="small" x="120" y="648">title / source_uri</text>
  <rect class="box-purple" x="258" y="606" width="138" height="54" />
  <text class="label" x="278" y="630">Chunks</text>
  <text class="small" x="278" y="648">content / embedding</text>
  <rect class="box-purple" x="100" y="680" width="296" height="54" />
  <text class="label" x="120" y="704">Backups</text>
  <text class="small" x="120" y="722">data/backups via /research backup</text>

  <rect class="blue" x="486" y="486" width="282" height="288" />
  <text class="section" x="516" y="522">Tool System</text>
  <rect class="box-blue" x="516" y="548" width="222" height="46" />
  <text class="label" x="536" y="576">FunctionToolManager</text>
  <rect class="box-blue" x="516" y="608" width="222" height="46" />
  <text class="label" x="536" y="636">ToolSet</text>
  <rect class="box-blue" x="516" y="668" width="222" height="46" />
  <text class="label" x="536" y="696">Builtin / MCP Tools</text>

  <rect class="red" x="828" y="480" width="294" height="302" />
  <text class="section" x="858" y="516">Agent Modes</text>
  <rect class="box-red" x="858" y="542" width="234" height="44" />
  <text class="label" x="878" y="570">/research agent</text>
  <rect class="box-red" x="858" y="600" width="234" height="44" />
  <text class="label" x="878" y="628">/research agent_web</text>
  <rect class="box-red" x="858" y="658" width="234" height="44" />
  <text class="label" x="878" y="686">/research agent_mcp</text>
  <rect class="box-red" x="858" y="716" width="234" height="44" />
  <text class="label" x="878" y="744">/research agent_multi</text>

  <rect class="orange" x="1190" y="464" width="250" height="328" />
  <text class="section" x="1220" y="500">External Research</text>
  <rect class="box-orange" x="1220" y="526" width="190" height="46" />
  <text class="label" x="1240" y="554">Web Search</text>
  <rect class="box-orange" x="1220" y="586" width="190" height="46" />
  <text class="label" x="1240" y="614">Page Extract</text>
  <rect class="box-orange" x="1220" y="646" width="190" height="46" />
  <text class="label" x="1240" y="674">Knowledge Base</text>
  <rect class="box-orange" x="1220" y="706" width="190" height="46" />
  <text class="label" x="1240" y="734">File / Python Tools</text>

  <rect class="panel" x="96" y="838" width="1308" height="176" />
  <text class="section" x="128" y="874">Main Rules</text>
  <text class="small" x="128" y="904">1. Stored knowledge is Document + Chunk. Every saved chunk must have an embedding.</text>
  <text class="small" x="128" y="928">2. Retrieval is embedding-only; there is no keyword fallback.</text>
  <text class="small" x="128" y="952">3. External results are not saved unless the user confirms import or clearly asks research_add_text to save them.</text>
  <text class="small" x="128" y="976">4. agent_mcp and agent_multi use allowlisted tools. Delete operations require explicit confirmation.</text>
  <text class="small" x="128" y="1000">5. Answers should include source references and unknowns when evidence is missing.</text>

